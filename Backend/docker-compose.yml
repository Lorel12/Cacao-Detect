version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: cacaodetect-db
    environment:
      POSTGRES_USER: cacaouser
      POSTGRES_PASSWORD: cacaopass
      POSTGRES_DB: cacaodetect
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cacaouser"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache (optionnel)
  redis:
    image: redis:7-alpine
    container_name: cacaodetect-cache
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cacaodetect-backend
    environment:
      DATABASE_URL: postgresql://cacaouser:cacaopass@postgres:5432/cacaodetect
      DEBUG: "False"
      SECRET_KEY: "your-secret-key-change-in-production"
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: "python -m uvicorn app.main:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
  redis_data:
  uploads_data:

networks:
  default:
    name: cacaodetect-network
